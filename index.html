<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Market Dashboard</title>

<style>
  body {
    margin: 0;
    font-family: Arial;
    background: #adb3be;
    color: white;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 25px;
    background: #111827;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 15px;
  }

  .refresh-btn {
    padding: 8px 12px;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
  }

  .refresh-btn:hover {
    background: #1d4ed8;
  }

  .container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    padding: 20px;
  }

  .card {
    background: #2c3851;
    padding: 15px;
    border-radius: 12px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th, td {
    padding: 10px;
    text-align: center;
    border-bottom: 1px solid #1f2937;
  }

  th { color: #60a5fa; }

  .positive { color: #00ff11; font-weight: bold; }
  .negative { color: #ff0404; font-weight: bold; }

  .insight-red { color: #ff4d4d; font-weight: bold; }
  .insight-green { color: #00ffcc; font-weight: bold; }
  .insight-yellow { color: #ffd700; font-weight: bold; }

  .positive-flash {
    animation: greenFlash 0.8s ease;
  }

  .negative-flash {
    animation: redFlash 0.8s ease;
  }

  @keyframes greenFlash {
    0% { background: rgb(0, 255, 94); }
    100% { background: transparent; }
  }

  @keyframes redFlash {
    0% { background: rgb(255, 0, 0); }
    100% { background: transparent; }
  }
</style>
</head>

<body>

<header>
  <h2>Live Oil Market Dashboard</h2>

  <div class="header-right">
    <button class="refresh-btn" onclick="manualRefresh()">🔄 Refresh</button>
    <div id="clock" style="font-weight: bold;"></div>
  </div>
</header>

<div class="container">

  <div class="card">
    <h3>KLC Market</h3>
    <table id="klcTable"></table>
  </div>

  <div class="card">
    <h3>CBOT Market</h3>
    <table id="cbotTable"></table>
  </div>

  <div class="card" style="grid-column: span 2;">
    <h3>Import Tariff Dashboard</h3>
    <table>
      <thead>
        <tr>
          <th>Product</th>
          <th>Market</th>
          <th>Tariff $</th>
          <th>USD→INR</th>
          <th>INR</th>
          <th>Duty</th>
          <th>Insight</th>
        </tr>
      </thead>
      <tbody id="dashboardTable"></tbody>
    </table>
  </div>

</div>

<script>

const API = "https://market-analysis-gpia.onrender.com/api/prices";

//////////////////////////////
// ⏰ CLOCK
//////////////////////////////
function updateClock() {
  const now = new Date();

  const date = now.toLocaleDateString("en-GB");

  const time = now.toLocaleTimeString("en-US", {
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit",
    hour12: true
  });

  document.getElementById("clock").innerHTML =
    "<b>" + date + " | " + time + "</b>";
}
setInterval(updateClock, 1000);

//////////////////////////////
// 📊 PREVIOUS DATA (FOR FLASH)
//////////////////////////////
let previousData = {
  KLC: {},
  CBOT: {}
};

//////////////////////////////
// 📊 LOAD MARKET DATA
//////////////////////////////
async function loadData() {
  const res = await fetch(API);
  const data = await res.json();

  renderTable("klcTable", data.KLC, "KLC");
  renderTable("cbotTable", data.CBOT, "SOYOIL");

  previousData = data;
}

//////////////////////////////
// 📋 RENDER TABLE WITH FLASH
//////////////////////////////
function renderTable(id, dataset, prefix) {
  let html = `
    <tr>
      <th>Month</th>
      <th>Price</th>
      <th>Change</th>
    </tr>
  `;

  Object.keys(dataset || {}).forEach(month => {
    const item = dataset[month];

    const prev = previousData?.[id === "klcTable" ? "KLC" : "CBOT"]?.[month]?.price;

    const current = parseFloat(item.price);
    const previous = parseFloat(prev);

    let flashClass = "";

    if (!isNaN(previous)) {
      if (current > previous) flashClass = "positive-flash";
      else if (current < previous) flashClass = "negative-flash";
    }

    const changeClass = parseFloat(item.change) >= 0 ? "positive" : "negative";

    html += `
      <tr class="${flashClass}">
        <td>${prefix} ${month}</td>
        <td>${item.price}</td>
        <td class="${changeClass}">${item.change}</td>
      </tr>
    `;
  });

  document.getElementById(id).innerHTML = html;
}

//////////////////////////////
// 🔥 DASHBOARD DATA
//////////////////////////////
async function loadDashboard() {
  const res = await fetch("https://market-analysis-gpia.onrender.com/api/dashboard");
  const data = await res.json();

  let html = "";

  Object.keys(data).forEach(key => {
    const d = data[key];

    let insightClass = "insight-yellow";
    if (d.insight.includes("🔴")) insightClass = "insight-red";
    if (d.insight.includes("🟢")) insightClass = "insight-green";

    html += `
      <tr>
        <td>${key}</td>
        <td>${d.market_price}</td>
        <td>$${d.tariff_usd}</td>
        <td>${d.usd.toFixed(2)}</td>
        <td>₹${d.tariff_inr.toFixed(0)}</td>
        <td>${d.duty}%</td>
        <td class="${insightClass}">${d.insight}</td>
      </tr>
    `;
  });

  document.getElementById("dashboardTable").innerHTML = html;
}

//////////////////////////////
// 🔄 MANUAL REFRESH
//////////////////////////////
function manualRefresh() {
  loadData();
  loadDashboard();
}

//////////////////////////////
// 🚀 INIT
//////////////////////////////
loadData();
loadDashboard();

setInterval(loadData, 5000);
setInterval(loadDashboard, 5000);

</script>

</body>
</html>
